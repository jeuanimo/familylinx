{% extends "base.html" %}

{% block title %}Sign Out - FamilyLinx{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card" style="text-align: center;">
        <div class="auth-header">
            <div class="auth-logo">
                <span class="brand-badge" style="width: 56px; height: 56px; font-size: 1.5rem;">FL</span>
            </div>
            <h1>Sign Out</h1>
            <p class="muted">Are you sure you want to sign out?</p>
        </div>
        
        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            {% if redirect_field_value %}
            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
            {% endif %}
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-box-arrow-right"></i> Sign Out
            </button>
        </form>
        
        <div class="auth-footer">
            <p><a href="{% url 'home' %}">Cancel and go back</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.auth-page {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
}

.auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--fl-surface);
    border-radius: var(--fl-radius);
    box-shadow: var(--fl-shadow);
    padding: 2.5rem;
}

.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}

.auth-logo {
    display: flex;
    justify-content: center;
    margin-bottom: 1.25rem;
}

.auth-header h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--fl-blue);
}

.auth-header p {
    margin: 0;
}

.auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--fl-border);
}

.auth-footer p {
    margin: 0;
    color: var(--fl-muted);
}

.auth-footer a {
    color: var(--fl-blue);
    font-weight: 600;
}
</style>
{% endblock %}
