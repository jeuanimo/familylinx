services:
  - type: web
    name: familylinx-web
    env: python
    plan: free
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "fam-linx.org,www.fam-linx.org,familylinx-web.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://fam-linx.org,https://www.fam-linx.org,https://familylinx-web.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: familylinx-db
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false
      - key: EMAIL_HOST
        value: "mail.privateemail.com"
      - key: EMAIL_PORT
        value: "465"
      - key: EMAIL_HOST_USER
        value: "contact@fam-linx.org"
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "contact@fam-linx.org"
      - key: INVITE_BCC_EMAIL
        value: "contact@fam-linx.org"
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      - key: CORS_ALLOW_CREDENTIALS
        value: "true"
    healthCheckPath: /

databases:
  - name: familylinx-db
    plan: free
    region: oregon
